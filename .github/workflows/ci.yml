# ==============================================================================
# 🚀 Enterprise CI Pipeline for Vision-Reward-OS
# Automatically runs unit tests on every Push or Pull Request to the main branch.
# ==============================================================================

name: CI Pipeline

# Trigger the workflow on push or pull request events to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up Python 3.10 (Standard for our ML stack)
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        # Magic Trick: Cache pip dependencies to speed up future runs!
        cache: 'pip'

    # 3. Install core and testing dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    # 4. Run the test suite using Pytest
    # The tests will execute our Monkey Patches and Mocking logic lightning fast!
    - name: Execute Tests
      run: |
        python -m pytest tests/test_api.py